<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeerostock Inventory Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decor"></div>
    <div class="app-container">
        <header>
            <h1>Zeerostock <span>Inventory</span></h1>
            <p>Discover strictly verified surplus products from top tier suppliers globally</p>
        </header>

        <div class="search-card">
            <div class="filters-grid">
                <div class="input-group">
                    <label>Product Name</label>
                    <input type="text" id="query" placeholder="e.g. Ergonomic Office Chair">
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <div class="select-wrapper">
                        <select id="category">
                            <option value="All">All Categories</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Home">Home</option>
                        </select>
                    </div>
                </div>

                <div class="price-inputs">
                    <div class="input-group">
                        <label>Min Price</label>
                        <input type="number" id="minPrice" placeholder="$0">
                    </div>
                    <div class="input-group">
                        <label>Max Price</label>
                        <input type="number" id="maxPrice" placeholder="$9999">
                    </div>
                </div>
            </div>

            <!-- THE BIG BUTTON -->
            <button class="big-search-btn" onclick="searchInventory()">
                <div class="btn-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <span>SEARCH INVENTORY</span>
                </div>
            </button>
        </div>

        <div id="resultsContainer">
            <table id="resultsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Supplier</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
            <div id="noResults" class="empty-state">
                <div class="empty-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <h3>Ready to Search</h3>
                <p>Enter your criteria above to find surplus inventory.</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
